<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            letter-spacing: 2px;
        }

        .info-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
        }

        #gameCanvas {
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border: 3px solid #667eea;
            border-radius: 10px;
            display: block;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
            cursor: none;
        }

        .controls {
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        #startBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #restartBtn {
            background: #f0f0f0;
            color: #333;
        }

        #restartBtn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .game-over-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #ffe6e6;
            border-left: 4px solid #ff6b6b;
            border-radius: 5px;
            color: #c92a2a;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status {
            font-size: 1.1em;
            margin-top: 10px;
            min-height: 1.5em;
        }

        .status.active {
            color: #51cf66;
            font-weight: 600;
        }

        .status.paused {
            color: #ffa500;
            font-weight: 600;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.85em;
            color: #999;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            #gameCanvas {
                width: 100%;
                height: auto;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE</h1>
        
        <div class="info-bar">
            <div class="info-item">
                <div class="info-label">Score</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">High Score</div>
                <div class="info-value" id="highScore">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">Level</div>
                <div class="info-value" id="level">1</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="status" id="status"></div>
        <div class="game-over-message" id="gameOverMessage"></div>

        <div class="button-group">
            <button id="startBtn">Start Game</button>
            <button id="restartBtn">Restart</button>
        </div>

        <div class="instructions">
            <p>Use <strong>arrow keys</strong> to move</p>
            <p>Eat food to grow and score points</p>
            <p>Don't hit the walls or yourself!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const levelDisplay = document.getElementById('level');
        const statusDisplay = document.getElementById('status');
        const gameOverMessage = document.getElementById('gameOverMessage');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 }
        ];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let gameSpeed = 100;
        let gameLevel = 1;

        highScoreDisplay.textContent = highScore;

        function generateFood() {
            let newFood;
            let isOnSnake = true;
            
            while (isOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                isOnSnake = snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            food = newFood;
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            
            gameLevel = Math.floor(score / 50) + 1;
            levelDisplay.textContent = gameLevel;
            gameSpeed = 100 - (gameLevel - 1) * 10;
            gameSpeed = Math.max(gameSpeed, 50);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }
        }

        function update() {
            if (!gameRunning || gamePaused || gameOver) return;

            direction = nextDirection;

            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            // Check wall collision
            if (newHead.x < 0 || newHead.x >= tileCount || 
                newHead.y < 0 || newHead.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            if (snake.some(segment => 
                segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }

            snake.unshift(newHead);

            // Check food collision
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = '#2a2a4e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                const pos = i * gridSize;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(canvas.width, pos);
                ctx.stroke();
            }

            // Draw food with glow
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fillRect(
                food.x * gridSize + 2,
                food.y * gridSize + 2,
                gridSize - 4,
                gridSize - 4
            );
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#51cf66';
                    ctx.shadowColor = '#51cf66';
                    ctx.shadowBlur = 15;
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                    
                    // Eyes
                    ctx.fillStyle = '#fff';
                    const eyeSize = 4;
                    const eyeOffset = 6;
                    if (direction.x === 1) {
                        ctx.fillRect(segment.x * gridSize + eyeOffset + 2, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + eyeOffset + 2, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction.x === -1) {
                        ctx.fillRect(segment.x * gridSize + 8, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 8, segment.y * gridSize + 12, eyeSize, eyeSize);
                    } else if (direction.y === -1) {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 8, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 8, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + eyeOffset + 2, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + eyeOffset + 2, eyeSize, eyeSize);
                    }
                } else {
                    // Body
                    const hue = 120 - (index * 3);
                    ctx.fillStyle = `hsl(${hue}, 100%, 40%)`;
                    ctx.shadowColor = '#51cf66';
                    ctx.shadowBlur = 5;
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                }
            });
            
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            
            if (gameRunning && !gameOver) {
                setTimeout(gameLoop, gameSpeed);
            }
        }

        function startGame() {
            if (gameOver) {
                resetGame();
            }
            
            gameRunning = true;
            gamePaused = false;
            gameOver = false;
            gameOverMessage.style.display = 'none';
            startBtn.disabled = true;
            statusDisplay.textContent = '▶ Game Running';
            statusDisplay.className = 'status active';
            
            gameLoop();
        }

        function endGame() {
            gameRunning = false;
            gameOver = true;
            startBtn.disabled = false;
            statusDisplay.textContent = '✗ Game Over';
            statusDisplay.className = 'status';
            gameOverMessage.style.display = 'block';
            gameOverMessage.textContent = `Game Over! Final Score: ${score}`;
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameLevel = 1;
            gameSpeed = 100;
            generateFood();
            updateScore();
            gameOverMessage.style.display = 'none';
            startBtn.disabled = false;
            statusDisplay.textContent = '⏸ Ready to Start';
            statusDisplay.className = 'status';
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', resetGame);

        // Initial draw
        resetGame();
    </script>
</body>
</html>
