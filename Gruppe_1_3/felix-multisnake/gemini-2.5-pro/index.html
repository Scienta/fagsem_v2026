<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 400px;
            border: 4px solid #4cc9f0;
            border-radius: 8px;
            background-color: #0d1b2a;
            box-shadow: 0 0 20px rgba(76, 201, 240, 0.3);
        }

        canvas {
            display: block;
            border-radius: 4px;
        }

        #score-container {
            margin-top: 1rem;
            font-size: 1.5rem;
        }
        
        #score-container span {
            font-weight: bold;
            color: #4cc9f0;
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 26, 26, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }

        #game-over-overlay h2 {
            font-size: 2.5rem;
            color: #f72585;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.5);
        }

        #restart-button {
            background-color: #4cc9f0;
            color: #1a1a1a;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #restart-button:hover {
            background-color: #3a86ff;
        }
        
        #restart-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <h1>Snake</h1>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="400"></canvas>
        <div id="game-over-overlay">
            <h2>Game Over</h2>
            <button id="restart-button">Restart</button>
        </div>
    </div>
    <div id="score-container">Score: <span id="score">0</span></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            const ctx = canvas.getContext('2d');
            const scoreEl = document.getElementById('score');
            const gameOverOverlay = document.getElementById('game-over-overlay');
            const restartButton = document.getElementById('restart-button');

            const gridSize = 20;
            const tileCount = canvas.width / gridSize;

            let snake, food, direction, score, gameLoop, isGameOver;

            function init() {
                snake = [{ x: 10, y: 10 }];
                food = {};
                direction = { x: 0, y: 0 };
                score = 0;
                isGameOver = false;
                
                scoreEl.textContent = score;
                gameOverOverlay.style.display = 'none';
                
                placeFood();
                if (gameLoop) clearInterval(gameLoop);
                gameLoop = setInterval(update, 100);
            }

            function placeFood() {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };

                // Ensure food doesn't spawn on the snake
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        placeFood();
                        break;
                    }
                }
            }

            function update() {
                if (isGameOver) return;

                const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
                
                // Wall collision
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    return gameOver();
                }

                // Self collision
                for (let i = 1; i < snake.length; i++) {
                    if (head.x === snake[i].x && head.y === snake[i].y) {
                        return gameOver();
                    }
                }
                
                snake.unshift(head);

                // Food collision
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    scoreEl.textContent = score;
                    placeFood();
                } else {
                    snake.pop();
                }

                draw();
            }

            function draw() {
                // Background
                ctx.fillStyle = '#0d1b2a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Snake
                for (let i = 0; i < snake.length; i++) {
                    ctx.fillStyle = i === 0 ? '#4cc9f0' : '#3a86ff'; // Head is a different color
                    ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
                }

                // Food
                ctx.fillStyle = '#f72585';
                ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            }

            function gameOver() {
                isGameOver = true;
                clearInterval(gameLoop);
                gameOverOverlay.style.display = 'flex';
            }

            function handleKeyPress(e) {
                const key = e.key;
                const goingUp = direction.y === -1;
                const goingDown = direction.y === 1;
                const goingLeft = direction.x === -1;
                const goingRight = direction.x === 1;

                if ((key === 'ArrowUp' || key === 'w') && !goingDown) {
                    direction = { x: 0, y: -1 };
                } else if ((key === 'ArrowDown' || key === 's') && !goingUp) {
                    direction = { x: 0, y: 1 };
                } else if ((key === 'ArrowLeft' || key === 'a') && !goingRight) {
                    direction = { x: -1, y: 0 };
                } else if ((key === 'ArrowRight' || key === 'd') && !goingLeft) {
                    direction = { x: 1, y: 0 };
                }
            }
            
            document.addEventListener('keydown', handleKeyPress);
            restartButton.addEventListener('click', init);

            init();
        });
    </script>
</body>
</html>
