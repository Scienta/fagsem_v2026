<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2a2a2a;
            --text-color: #eee;
            --accent-color: #4CAF50;
            --danger-color: #e74c3c;
            --snake-head: #81C784;
            --snake-body: #4CAF50;
            --food-color: #ff5252;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            background-color: var(--panel-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        canvas {
            background-color: #000;
            border: 4px solid #333;
            border-radius: 4px;
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #overlay.visible {
            visibility: visible;
            opacity: 1;
        }

        h1 { margin: 0 0 10px 0; color: var(--accent-color); }
        
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            font-weight: bold;
        }

        button:hover { background-color: #45a049; }
        button:active { transform: scale(0.95); }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Best: <span id="high-score">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="overlay">
            <h1 id="status-text">GAME OVER</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="restart-btn">START GAME</button>
        </div>

        <div class="controls-hint">Use Arrow Keys to Move</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const finalScoreEl = document.getElementById('final-score');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const restartBtn = document.getElementById('restart-btn');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let gameLoop;
        let isPaused = true;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            score = 0;
            scoreEl.textContent = score;
            nextDx = 0;
            nextDy = -1; // Start moving up
            dx = 0;
            dy = 0;
            placeFood();
            isPaused = false;
            overlay.classList.remove('visible');
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, 100);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Prevent food from spawning on snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) placeFood();
            });
        }

        function draw() {
            update();
            if (checkGameOver()) {
                endGame();
                return;
            }
            clearCanvas();
            drawFood();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Subtle grid
            ctx.strokeStyle = "#111";
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=gridSize) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#81C784' : '#4CAF50';
                // Draw rounded rect for snake parts
                const r = 4;
                const x = part.x * gridSize + 1;
                const y = part.y * gridSize + 1;
                const s = gridSize - 2;
                
                ctx.beginPath();
                ctx.roundRect(x, y, s, s, r);
                ctx.fill();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff5252";
            ctx.beginPath();
            const centerX = food.x * gridSize + gridSize/2;
            const centerY = food.y * gridSize + gridSize/2;
            ctx.arc(centerX, centerY, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Add a little shine to food
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.beginPath();
            ctx.arc(centerX - 3, centerY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function checkGameOver() {
            const head = snake[0];
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return true;
            // Self collision
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return true;
            }
            return false;
        }

        function endGame() {
            clearInterval(gameLoop);
            isPaused = true;
            statusText.textContent = "GAME OVER";
            finalScoreEl.textContent = score;
            restartBtn.textContent = "TRY AGAIN";
            overlay.classList.add('visible');
        }

        window.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp':
                    if (dy !== 1) { nextDx = 0; nextDy = -1; }
                    break;
                case 'ArrowDown':
                    if (dy !== -1) { nextDx = 0; nextDy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) { nextDx = -1; nextDy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) { nextDx = 1; nextDy = 0; }
                    break;
            }
        });

        restartBtn.addEventListener('click', initGame);

        // Initial state
        clearCanvas();
        overlay.classList.add('visible');
        statusText.textContent = "SNAKE";
        restartBtn.textContent = "START GAME";
    </script>
</body>
</html>
