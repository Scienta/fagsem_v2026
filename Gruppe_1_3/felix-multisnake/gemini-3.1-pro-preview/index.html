<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --canvas-bg: #0f3460;
            --snake-color: #4ecca3;
            --food-color: #e94560;
            --text-color: #eeeeee;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
        }

        #game-container {
            background-color: var(--container-bg);
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--snake-color);
        }

        #score-board {
            font-size: 20px;
            font-weight: bold;
        }

        canvas {
            background-color: var(--canvas-bg);
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(22, 33, 62, 0.85);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over-text {
            font-size: 36px;
            font-weight: bold;
            color: var(--food-color);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #final-score {
            font-size: 20px;
            margin-bottom: 25px;
        }

        button {
            background-color: var(--snake-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
            background-color: #5ce0b5;
        }

        button:active {
            transform: translateY(0);
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <h1>Snake</h1>
            <div id="score-board">Score: <span id="score">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <div id="game-over-text">Game Over!</div>
            <div id="final-score">Final Score: <span>0</span></div>
            <button id="restart-btn">Play Again</button>
        </div>

        <div class="controls-hint">Use Arrow Keys to move</div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const overlay = document.getElementById("overlay");
        const finalScoreElement = document.querySelector("#final-score span");
        const restartBtn = document.getElementById("restart-btn");

        // Game configuration
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let gameSpeed = 100; // ms per frame

        // Colors
        const snakeColor = getComputedStyle(document.documentElement).getPropertyValue('--snake-color').trim();
        const snakeHeadColor = '#5ce0b5';
        const foodColor = getComputedStyle(document.documentElement).getPropertyValue('--food-color').trim();

        // Game state
        let snake = [];
        let dx = 0;
        let dy = 0;
        let foodX = 0;
        let foodY = 0;
        let score = 0;
        let gameLoop;
        let isGameOver = false;
        let nextDx = 0;
        let nextDy = 0;

        function initGame() {
            // Reset state
            snake = [
                { x: 10, y: 10 },
            ];
            dx = 0;
            dy = 0;
            nextDx = 0;
            nextDy = 0;
            score = 0;
            gameSpeed = 120;
            isGameOver = false;
            
            scoreElement.innerText = score;
            overlay.classList.remove('active');
            
            placeFood();
            
            // Clear existing interval if any
            if (gameLoop) clearTimeout(gameLoop);
            
            // Start loop
            main();
        }

        function main() {
            if (isGameOver) return;

            gameLoop = setTimeout(function onTick() {
                clearCanvas();
                moveSnake();
                checkCollision();
                if (!isGameOver) {
                    drawFood();
                    drawSnake();
                    main();
                }
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? snakeHeadColor : snakeColor;
                
                // Add a slight margin for grid effect
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            // Update actual direction from buffered input
            dx = nextDx;
            dy = nextDy;

            // If not moving, don't update positions
            if (dx === 0 && dy === 0) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === foodX && head.y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                // Increase speed slightly
                if (gameSpeed > 50) gameSpeed -= 2;
                placeFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = foodColor;
            
            // Draw a circular food
            ctx.beginPath();
            ctx.arc(
                foodX * gridSize + gridSize / 2, 
                foodY * gridSize + gridSize / 2, 
                gridSize / 2 - 2, 
                0, 
                2 * Math.PI
            );
            ctx.fill();
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);

            // Make sure food doesn't spawn on the snake
            const isOnSnake = snake.some(segment => segment.x === foodX && segment.y === foodY);
            if (isOnSnake) {
                placeFood();
            }
        }

        function checkCollision() {
            const head = snake[0];

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                handleGameOver();
            }

            // Self collision (start checking from index 4 because it's impossible to hit the first 3 body parts)
            for (let i = 4; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    handleGameOver();
                }
            }
        }

        function handleGameOver() {
            isGameOver = true;
            finalScoreElement.innerText = score;
            overlay.classList.add('active');
        }

        // Key controls
        document.addEventListener("keydown", (event) => {
            // Prevent default scrolling for arrow keys
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(event.code) > -1) {
                event.preventDefault();
            }

            const key = event.key;
            
            // Prevent reversing direction directly
            if (key === "ArrowUp" && dy !== 1) {
                nextDx = 0;
                nextDy = -1;
            } else if (key === "ArrowDown" && dy !== -1) {
                nextDx = 0;
                nextDy = 1;
            } else if (key === "ArrowLeft" && dx !== 1) {
                nextDx = -1;
                nextDy = 0;
            } else if (key === "ArrowRight" && dx !== -1) {
                nextDx = 1;
                nextDy = 0;
            }
        });

        restartBtn.addEventListener("click", initGame);

        // Draw initial state before starting
        clearCanvas();
        initGame();
        // Pause until first move
        dx = 0;
        dy = 0;
        nextDx = 0;
        nextDy = 0;
        
    </script>
</body>
</html>
