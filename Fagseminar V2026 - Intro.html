document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng: border-box; margin: 0; padding: 0; }\n\n    body {\n      font-family: 'DM Sans', Helvetica, Arial, sans-serif;\n      background: #111;\n    }\n\n    deck-stage {\n      --stage-bg: #111;\n    }\n\n    /* ── SLIDE BASE ──────────────────────────────────────── */\n    section {\n      background: var(--bg);\n      color: var(--ink);\n      width: 100%;\n      height: 100%;\n      display: flex;\n      flex-direction: column;\n      padding: var(--pt) var(--px) var(--pb);\n      position: relative;\n      overflow: hidden;\n    }\n\n    section.dark {\n      background: var(--green);\n      color: #fff;\n    }\n    section.dark-deep {\n      background: oklch(24% 0.08 155);\n      color: #fff;\n    }\n\n    /* ── LOGO ────────────────────────────────────────────── */\n    .logo {\n      position: absolute;\n      top: 48px;\n      right: var(--px);\n      font-size: var(--t-xsmall);\n      font-weight: 600;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--green);\n    }\n    .dark .logo, .dark-deep .logo { color: rgba(255,255,255,0.5); }\n\n    .logo-mark {\n      display: inline-block;\n      width: 28px;\n      height: 28px;\n      background: var(--green);\n      border-radius: 50%;\n      vertical-align: middle;\n      margin-right: 8px;\n    }\n    .dark .logo-mark, .dark-deep .logo-mark {\n      background: rgba(255,255,255,0.3);\n    }\n\n    /* ── EYEBROW ─────────────────────────────────────────── */\n    .eyebrow {\n      font-size: var(--t-small);\n      font-weight: 500;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      color: var(--green);\n      margin-bottom: 20px;\n    }\n    .dark .eyebrow { color: rgba(255,255,255,0.65); }\n\n    /* ── HEADINGS ────────────────────────────────────────── */\n    h1 {\n      font-size: var(--t-title);\n      font-weight: 700;\n      line-height: 1.1;\n      letter-spacing: -0.02em;\n      color: var(--ink);\n    }\n    h2 {\n      font-size: var(--t-h2);\n      font-weight: 600;\n      letter-spacing: -0.01em;\n      line-height: 1.2;\n    }\n    .dark h1, .dark h2, .dark-deep h1, .dark-deep h2 { color: #fff; }\n\n    .slide-rule {\n      width: 56px;\n      height: 3px;\n      background: var(--green);\n      border-radius: 2px;\n      margin: 28px 0;\n    }\n    .dark .slide-rule { background: rgba(255,255,255,0.4); }\n\n    .sub {\n      font-size: var(--t-body);\n      font-weight: 300;\n      color: var(--ink2);\n      line-height: 1.5;\n    }\n    .dark .sub { color: rgba(255,255,255,0.75); }\n\n    .meta {\n      font-size: var(--t-small);\n      color: var(--ink3);\n      margin-top: auto;\n    }\n    .dark .meta { color: rgba(255,255,255,0.45); }\n\n    /* ── PROGRAM TABLE ───────────────────────────────────── */\n    .program {\n      display: flex;\n      flex-direction: column;\n      gap: 12px;\n      margin-top: var(--gap-title);\n      flex: 1;\n    }\n    .prog-row {\n      display: grid;\n      grid-template-columns: 180px 1fr;\n      gap: 24px;\n      align-items: baseline;\n      padding: 14px 0;\n      border-bottom: 1px solid var(--rule);\n    }\n    .prog-row:last-child { border-bottom: none; }\n    .prog-time {\n      font-size: var(--t-small);\n      font-weight: 600;\n      color: var(--ink3);\n      font-variant-numeric: tabular-nums;\n    }\n    .prog-label {\n      font-size: var(--t-body);\n      color: var(--ink);\n    }\n    .prog-label strong { font-weight: 600; }\n    .prog-label .note {\n      display: block;\n      font-size: var(--t-xsmall);\n      color: var(--ink3);\n      margin-top: 4px;\n      font-weight: 300;\n    }\n    .prog-row.highlight .prog-label { color: var(--green); font-weight: 600; }\n    .day-label {\n      font-size: var(--t-small);\n      font-weight: 700;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      color: var(--green);\n      margin-bottom: 8px;\n    }\n\n    /* ── TEMA CARDS ──────────────────────────────────────── */\n    .tema-grid {\n      display: grid;\n      grid-template-columns: repeat(5, 1fr);\n      gap: 20px;\n      margin-top: var(--gap-title);\n      flex: 1;\n    }\n    .tema-card {\n      background: var(--bg2);\n      border-radius: 12px;\n      padding: 28px 24px;\n      display: flex;\n      flex-direction: column;\n      gap: 12px;\n    }\n    .tema-num {\n      font-size: 40px;\n      font-weight: 700;\n      color: var(--green);\n      line-height: 1;\n    }\n    .tema-title {\n      font-size: var(--t-small);\n      font-weight: 600;\n      color: var(--ink);\n      line-height: 1.3;\n    }\n    .tema-desc {\n      font-size: var(--t-xsmall);\n      color: var(--ink2);\n      line-height: 1.5;\n      font-weight: 300;\n    }\n\n    /* ── GRUPPER ─────────────────────────────────────────── */\n    .grupper-grid {\n      display: grid;\n      grid-template-columns: repeat(5, 1fr);\n      gap: 20px;\n      margin-top: var(--gap-title);\n      flex: 1;\n    }\n    .gruppe-col {\n      display: flex;\n      flex-direction: column;\n      gap: 10px;\n    }\n    .gruppe-tema {\n      font-size: var(--t-xsmall);\n      font-weight: 700;\n      letter-spacing: 0.06em;\n      text-transform: uppercase;\n      color: var(--green);\n      margin-bottom: 4px;\n    }\n    .gruppe-box {\n      background: var(--bg2);\n      border-radius: 8px;\n      padding: 14px 16px;\n    }\n    .gruppe-id {\n      font-size: var(--t-xsmall);\n      font-weight: 700;\n      color: var(--ink);\n      margin-bottom: 6px;\n    }\n    .gruppe-names {\n      font-size: 24px;\n      color: var(--ink2);\n      line-height: 1.55;\n      font-weight: 300;\n    }\n\n    /* ── RAPPORT ─────────────────────────────────────────── */\n    .steg-list {\n      display: flex;\n      flex-direction: column;\n      gap: 16px;\n      margin-top: var(--gap-title);\n      flex: 1;\n    }\n    .steg-row {\n      display: grid;\n      grid-template-columns: 52px 1fr;\n      gap: 20px;\n      align-items: flex-start;\n    }\n    .steg-num {\n      width: 48px;\n      height: 48px;\n      background: var(--green-lt);\n      color: var(--green);\n      border-radius: 50%;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: var(--t-small);\n      font-weight: 700;\n      flex-shrink: 0;\n    }\n    .steg-body { padding-top: 8px; }\n    .steg-title {\n      font-size: var(--t-body);\n      font-weight: 600;\n      color: var(--ink);\n      margin-bottom: 4px;\n    }\n    .steg-desc {\n      font-size: var(--t-small);\n      color: var(--ink2);\n      font-weight: 300;\n      line-height: 1.5;\n    }\n\n    /* ── PRAKTISK ────────────────────────────────────────── */\n    .praktisk-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 28px;\n      margin-top: var(--gap-title);\n      flex: 1;\n    }\n    .info-block {\n      background: var(--bg2);\n      border-radius: 12px;\n      padding: 32px 30px;\n    }\n    .info-label {\n      font-size: var(--t-xsmall);\n      font-weight: 700;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      color: var(--green);\n      margin-bottom: 14px;\n    }\n    .info-line {\n      font-size: var(--t-small);\n      color: var(--ink);\n      line-height: 1.7;\n    }\n    .info-line strong { font-weight: 600; }\n    .info-line .dim { color: var(--ink3); }\n\n    /* ── QUOTE / BIG TEXT ────────────────────────────────── */\n    .big-quote {\n      font-size: 48px;\n      font-weight: 700;\n      line-height: 1.2;\n      letter-spacing: -0.02em;\n      color: #fff;\n      max-width: 1100px;\n    }\n    .big-quote em { color: oklch(80% 0.12 155); font-style: normal; }\n\n    /* ── DANIEL SLIDE ────────────────────────────────────── */\n    .daniel-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr;\n      gap: 40px;\n      margin-top: var(--gap-title);\n      flex: 1;\n      align-items: start;\n    }\n    .highlight-pill {\n      display: inline-block;\n      background: var(--green-lt);\n      color: var(--green);\n      border-radius: 20px;\n      padding: 6px 16px;\n      font-size: var(--t-xsmall);\n      font-weight: 600;\n    }\n    .bullet-list {\n      display: flex;\n      flex-direction: column;\n      gap: var(--gap-item);\n    }\n    .bullet-item {\n      display: flex;\n      gap: 16px;\n      align-items: flex-start;\n    }\n    .bullet-dot {\n      width: 8px;\n      height: 8px;\n      background: var(--green);\n      border-radius: 50%;\n      margin-top: 12px;\n      flex-shrink: 0;\n    }\n    .bullet-text {\n      font-size: var(--t-body);\n      color: var(--ink);\n      line-height: 1.5;\n    }\n    .bullet-text strong { font-weight: 600; }\n\n    /* ── KICK-OFF ────────────────────────────────────────── */\n    .kickoff-grid {\n      display: grid;\n      grid-template-columns: 1fr 1fr 1fr;\n      gap: 20px;\n      margin-top: var(--gap-title);\n    }\n    .kickoff-card {\n      border: 1.5px solid var(--rule);\n      border-radius: 12px;\n      padding: 28px 24px;\n    }\n    .kickoff-icon {\n      font-size: 32px;\n      margin-bottom: 14px;\n    }\n    .kickoff-title {\n      font-size: var(--t-small);\n      font-weight: 600;\n      color: var(--ink);\n      margin-bottom: 8px;\n    }\n    .kickoff-desc {\n      font-size: var(--t-xsmall);\n      color: var(--ink2);\n      line-height: 1.55;\n      font-weight: 300;\n    }\n  <\u002Fstyle>\n  \n\n<\u002Fhead><body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n  <!-- ① TITTEL ─────────────────────────────────────────── -->\n  <section data-screen-label=\"01 Tittel\">\n    <div class=\"logo\"><span class=\"logo-mark\"><\u002Fspan>Scienta<\u002Fdiv>\n    <div style=\"margin-top: auto; margin-bottom: auto;\">\n      <div class=\"eyebrow\">24–25 april 2026 · Scandic Holmenkollen Park<\u002Fdiv>\n      <h1>Fagseminar<br>Vår 2026<\u002Fh1>\n      <div class=\"slide-rule\"><\u002Fdiv>\n      <p class=\"sub\">Et seminar om å eksperimentere m
