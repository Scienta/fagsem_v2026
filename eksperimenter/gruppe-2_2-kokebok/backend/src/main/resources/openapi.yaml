openapi: 3.0.3
info:
  title: Kokebok API
  description: REST API for kokebok-applikasjonen – oppskrifter, bilder og menyer.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Lokal utviklingsserver

tags:
  - name: Oppskrifter
    description: CRUD og søk for oppskrifter
  - name: Bilder
    description: Bildeopplasting og -sletting per oppskrift
  - name: Menyer
    description: CRUD for menyer med kursretter
  - name: Metadata
    description: Oppslag på gyldige enum-verdier

paths:

  # ─── Oppskrifter ────────────────────────────────────────────────────────────

  /recipes:
    get:
      tags: [Oppskrifter]
      summary: Søk og list oppskrifter
      operationId: searchRecipes
      parameters:
        - name: q
          in: query
          description: Fritekst – søker i tittel og beskrivelse
          schema:
            type: string
          example: pasta
        - name: category
          in: query
          description: Filtrer på kategori
          schema:
            $ref: '#/components/schemas/Category'
        - name: cuisine
          in: query
          description: Filtrer på kjøkken
          schema:
            $ref: '#/components/schemas/Cuisine'
        - name: flavor
          in: query
          description: Filtrer på smak – kan repeteres for AND-logikk
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FlavorTag'
        - name: ingredient
          in: query
          description: Substring-søk i ingrediensnavn
          schema:
            type: string
          example: kylling
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: sortBy
          in: query
          schema:
            type: string
            default: title
            enum: [title, createdAt, updatedAt, prepTimeMinutes, cookTimeMinutes]
        - name: sortDir
          in: query
          schema:
            type: string
            default: asc
            enum: [asc, desc]
      responses:
        '200':
          description: Side med oppskriftssammendrag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeSummaryPage'

    post:
      tags: [Oppskrifter]
      summary: Opprett ny oppskrift
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeRequest'
            example:
              title: Pasta Carbonara
              description: Klassisk romersk pastarett
              category: MAIN_COURSE
              cuisine: ITALIAN
              prepTimeMinutes: 10
              cookTimeMinutes: 20
              flavorTags: [SAVORY, UMAMI]
              ingredients:
                - name: Spaghetti
                  amount: 400
                  unit: g
                  sortOrder: 0
                - name: Guanciale
                  amount: 150
                  unit: g
                  sortOrder: 1
                - name: Eggeplommer
                  amount: 4
                  unit: stk
                  sortOrder: 2
                - name: Pecorino Romano
                  amount: 60
                  unit: g
                  sortOrder: 3
              steps:
                - stepNumber: 1
                  description: Kok pasta i godt saltet vann til al dente.
                - stepNumber: 2
                  description: Stek guanciale i tørr panne til den er sprø.
                - stepNumber: 3
                  description: Bland eggeplommer og ost. Tilsett pastavann og bland med pasta og kjøtt utenfor varmen.
      responses:
        '201':
          description: Oppskrift opprettet
          headers:
            Location:
              description: URL til den nye oppskriften
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /recipes/{id}:
    parameters:
      - $ref: '#/components/parameters/RecipeId'

    get:
      tags: [Oppskrifter]
      summary: Hent én oppskrift med alle detaljer
      operationId: getRecipeById
      responses:
        '200':
          description: Oppskrift funnet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Oppskrifter]
      summary: Oppdater oppskrift (erstatter hele ressursen)
      operationId: updateRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecipeRequest'
      responses:
        '200':
          description: Oppskrift oppdatert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Oppskrifter]
      summary: Slett oppskrift og alle tilhørende bilder
      operationId: deleteRecipe
      responses:
        '204':
          description: Oppskrift slettet
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Bilder ─────────────────────────────────────────────────────────────────

  /recipes/{id}/images:
    parameters:
      - $ref: '#/components/parameters/RecipeId'

    post:
      tags: [Bilder]
      summary: Last opp bilde til oppskrift
      operationId: uploadRecipeImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Bildefil (JPEG, PNG, WebP eller GIF, maks 10 MB)
      responses:
        '201':
          description: Bilde lastet opp
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeImageDto'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /recipes/{id}/images/{imageId}:
    parameters:
      - $ref: '#/components/parameters/RecipeId'
      - name: imageId
        in: path
        required: true
        schema:
          type: integer
          format: int64

    delete:
      tags: [Bilder]
      summary: Slett ett bilde fra oppskrift
      operationId: deleteRecipeImage
      responses:
        '204':
          description: Bilde slettet
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Menyer ─────────────────────────────────────────────────────────────────

  /menus:
    get:
      tags: [Menyer]
      summary: List alle menyer
      operationId: getMenus
      responses:
        '200':
          description: Liste med menyer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuResponse'

    post:
      tags: [Menyer]
      summary: Opprett ny meny
      operationId: createMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuRequest'
            example:
              name: Italiensk kveld
              description: En fullstendig italiensk middag
              courses:
                - recipeId: 3
                  courseCategory: APPETIZER
                  courseOrder: 1
                - recipeId: 1
                  courseCategory: MAIN_COURSE
                  courseOrder: 2
                - recipeId: 7
                  courseCategory: DESSERT
                  courseOrder: 3
      responses:
        '201':
          description: Meny opprettet
          headers:
            Location:
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: En av oppskriftene i courses ble ikke funnet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /menus/{id}:
    parameters:
      - $ref: '#/components/parameters/MenuId'

    get:
      tags: [Menyer]
      summary: Hent én meny med alle retter
      operationId: getMenuById
      responses:
        '200':
          description: Meny funnet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Menyer]
      summary: Oppdater meny (erstatter hele ressursen inkl. kursretter)
      operationId: updateMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuRequest'
      responses:
        '200':
          description: Meny oppdatert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Menyer]
      summary: Slett meny
      operationId: deleteMenu
      responses:
        '204':
          description: Meny slettet
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Metadata ───────────────────────────────────────────────────────────────

  /meta/categories:
    get:
      tags: [Metadata]
      summary: Gyldige kategorier
      operationId: getCategories
      responses:
        '200':
          description: Liste med kategorinavn
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
              example: [APPETIZER, MAIN_COURSE, SIDE_DISH, DESSERT, SOUP, SALAD, DRINK]

  /meta/cuisines:
    get:
      tags: [Metadata]
      summary: Gyldige kjøkken
      operationId: getCuisines
      responses:
        '200':
          description: Liste med kjøkkennavn
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cuisine'

  /meta/flavors:
    get:
      tags: [Metadata]
      summary: Gyldige smaksprofiler
      operationId: getFlavors
      responses:
        '200':
          description: Liste med smaksprofiler
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FlavorTag'

# ─── Komponenter ────────────────────────────────────────────────────────────

components:

  parameters:
    RecipeId:
      name: id
      in: path
      required: true
      description: ID på oppskriften
      schema:
        type: integer
        format: int64
    MenuId:
      name: id
      in: path
      required: true
      description: ID på menyen
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Ugyldig forespørsel
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Ressurs ikke funnet
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'

  schemas:

    # ── Enums ────────────────────────────────────────────────────────────────

    Category:
      type: string
      enum: [APPETIZER, MAIN_COURSE, SIDE_DISH, DESSERT, SOUP, SALAD, DRINK]
      description: |
        Kategorier for oppskrifter og menyplasser:
        - `APPETIZER` – Forrett
        - `MAIN_COURSE` – Hovedrett
        - `SIDE_DISH` – Tilbehør
        - `DESSERT` – Dessert
        - `SOUP` – Suppe
        - `SALAD` – Salat
        - `DRINK` – Drikke

    Cuisine:
      type: string
      enum: [NORWEGIAN, ITALIAN, FRENCH, CHINESE, JAPANESE, INDIAN, MEXICAN, THAI, GREEK, AMERICAN, MIDDLE_EASTERN, SPANISH, OTHER]
      description: Kjøkkentradisjoner

    FlavorTag:
      type: string
      enum: [SPICY, SWEET, SAVORY, SOUR, UMAMI, BITTER, SMOKY, MILD]
      description: Smaksprofiler

    # ── Oppskrift ────────────────────────────────────────────────────────────

    IngredientDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
          example: Spaghetti
        amount:
          type: number
          format: double
          nullable: true
          example: 400
        unit:
          type: string
          nullable: true
          example: g
        sortOrder:
          type: integer
          example: 0
      required: [name, sortOrder]

    InstructionStepDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        stepNumber:
          type: integer
          example: 1
        description:
          type: string
          example: Kok pasta i godt saltet vann til al dente.
      required: [stepNumber, description]

    RecipeImageDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        url:
          type: string
          description: Relativ URL til bildet, f.eks. /uploads/images/abc123.jpg
          example: /uploads/images/abc123.jpg
        sortOrder:
          type: integer

    RecipeRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
          example: Pasta Carbonara
        description:
          type: string
          nullable: true
          example: Klassisk romersk pastarett
        prepTimeMinutes:
          type: integer
          minimum: 0
          nullable: true
          example: 10
        cookTimeMinutes:
          type: integer
          minimum: 0
          nullable: true
          example: 20
        category:
          $ref: '#/components/schemas/Category'
          nullable: true
        cuisine:
          $ref: '#/components/schemas/Cuisine'
          nullable: true
        flavorTags:
          type: array
          items:
            $ref: '#/components/schemas/FlavorTag'
          uniqueItems: true
          example: [SAVORY, UMAMI]
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDto'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/InstructionStepDto'

    RecipeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        title:
          type: string
          example: Pasta Carbonara
        description:
          type: string
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
        cuisine:
          $ref: '#/components/schemas/Cuisine'
        prepTimeMinutes:
          type: integer
          nullable: true
          example: 10
        cookTimeMinutes:
          type: integer
          nullable: true
          example: 20
        flavorTags:
          type: array
          items:
            $ref: '#/components/schemas/FlavorTag'
          uniqueItems: true
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientDto'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/InstructionStepDto'
        images:
          type: array
          items:
            $ref: '#/components/schemas/RecipeImageDto'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-24T10:00:00'
        updatedAt:
          type: string
          format: date-time
          example: '2026-04-24T14:30:00'

    RecipeSummaryResponse:
      type: object
      description: Kompakt versjon uten ingredienser og fremgangsmåte – brukes i listvisning
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          $ref: '#/components/schemas/Category'
        cuisine:
          $ref: '#/components/schemas/Cuisine'
        prepTimeMinutes:
          type: integer
          nullable: true
        cookTimeMinutes:
          type: integer
          nullable: true
        flavorTags:
          type: array
          items:
            $ref: '#/components/schemas/FlavorTag'
          uniqueItems: true
        thumbnailUrl:
          type: string
          nullable: true
          description: URL til første bilde, eller null hvis ingen bilder
          example: /uploads/images/abc123.jpg

    RecipeSummaryPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RecipeSummaryResponse'
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 3

    # ── Meny ─────────────────────────────────────────────────────────────────

    MenuCourseRequest:
      type: object
      required: [recipeId, courseCategory, courseOrder]
      properties:
        recipeId:
          type: integer
          format: int64
          example: 1
        courseCategory:
          $ref: '#/components/schemas/Category'
        courseOrder:
          type: integer
          minimum: 1
          description: Rekkefølge i menyen
          example: 2

    MenuRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Italiensk kveld
        description:
          type: string
          nullable: true
          example: En fullstendig italiensk middag med tre retter
        courses:
          type: array
          items:
            $ref: '#/components/schemas/MenuCourseRequest'

    MenuCourseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        courseCategory:
          $ref: '#/components/schemas/Category'
        courseOrder:
          type: integer
        recipe:
          $ref: '#/components/schemas/RecipeSummaryResponse'

    MenuResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 2
        name:
          type: string
          example: Italiensk kveld
        description:
          type: string
          nullable: true
        courses:
          type: array
          items:
            $ref: '#/components/schemas/MenuCourseResponse'
        createdAt:
          type: string
          format: date-time
          example: '2026-04-24T09:00:00'

    # ── Feil ─────────────────────────────────────────────────────────────────

    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: Recipe not found: 99
        path:
          type: string
          example: /api/v1/recipes/99
        timestamp:
          type: string
          format: date-time
